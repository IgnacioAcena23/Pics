<!DOCTYPE html>
<html lang="es" style="scroll-behavior: smooth;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALALA - Villegas</title>
    <link rel="icon" href="1Recurso.png" type="image/png">
    <link rel="stylesheet" href="styles2.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            padding-top: 120px;
        }

        .project-header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
            text-align: center;
        }

        .project-header h1 {
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .project-header p {
            font-size: 20px;
            color: var(--text-secondary);
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 15px;
            border: 2px solid rgba(255, 0, 34, 0.5);
            padding: 12px 28px;
            border-radius: 40px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 4px 20px rgba(255, 0, 34, 0.4);
            transform: translateY(-2px);
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 20px auto 100px;
            padding: 0 40px;
        }

        .bento-gallery {
            display: grid !important;
            grid-template-columns: repeat(4, 1fr) !important;
            grid-template-rows: auto auto !important;
            gap: 16px !important;
            width: 90vw !important;
            height: auto !important;
            padding: 40px 0 !important;
        }

        /* Perfect gapless masonry mappings for the 7 items */
        .item-1 {
            grid-column: span 1;
            grid-row: 1;
        }

        .item-2 {
            grid-column: span 2;
            grid-row: 1;
        }

        /* Horizontal center */
        .item-3 {
            grid-column: span 1;
            grid-row: 1;
        }

        .item-4 {
            grid-column: span 1;
            grid-row: 2;
        }

        .item-5 {
            grid-column: span 1;
            grid-row: 2;
        }

        .item-6 {
            grid-column: span 1;
            grid-row: 2;
        }

        .item-7 {
            grid-column: span 1;
            grid-row: 2;
        }

        .bento-item {
            background: #0b0e14 !important;
            border: none !important;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5) !important;
            display: block !important;
            border-radius: 16px !important;
            overflow: hidden !important;
        }

        .bento-item img {
            width: 100% !important;
            height: 100% !important;
            display: block !important;
            object-fit: cover !important;
            border-radius: 0 !important;
            transition: transform 0.4s ease;
        }

        .bento-container {
            height: auto !important;
            min-height: 100vh !important;
            overflow: visible !important;
            padding-top: 40px !important;
        }

        .bento-container {
            height: auto !important;
            min-height: 100vh !important;
            overflow: visible !important;
            padding-top: 40px !important;
        }

        .bento-container {
            height: auto !important;
            min-height: 100vh !important;
            overflow: visible !important;
            padding-top: 40px !important;
        }

        .media-item {
            border-radius: 16px;
            overflow: hidden;
            background: #0b0e14;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .media-item img,
        .media-item video {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.4s ease;
        }

        .media-item:hover img {
            transform: scale(1.05);
        }

        .media-item.large {
            grid-column: span 2;
        }

        @media (max-width: 768px) {
            .media-item.large {
                grid-column: span 1;
            }
        }
    </style>
</head>
