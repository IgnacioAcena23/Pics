<!DOCTYPE html>
<html lang="es" style="scroll-behavior: smooth;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALALA - Villegas</title>
    <link rel="icon" href="1Recurso.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            padding-top: 120px;
        }

        .project-header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
            text-align: center;
        }

        .project-header h1 {
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .project-header p {
            font-size: 20px;
            color: var(--text-secondary);
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 15px;
            border: 2px solid rgba(255, 0, 34, 0.5);
            padding: 12px 28px;
            border-radius: 40px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 4px 20px rgba(255, 0, 34, 0.4);
            transform: translateY(-2px);
        }

        /* Curated photo grid - 3 columns, no cropping */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 1200px;
            margin: 20px auto 100px;
            padding: 0 40px;
        }

        .media-item {
            border-radius: 12px;
            overflow: hidden;
            background: #0b0e14;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .media-item.span-3 { grid-column: span 3; }
        .media-item.span-2 { grid-column: span 2; }

        .media-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .media-item:hover img { transform: scale(1.03); }

        @media (max-width: 768px) {
            body { padding-top: 100px; }
            .project-header { padding: 20px; }
            .project-header h1 { font-size: 36px; }
            .project-header p { font-size: 16px; }
            .media-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; padding: 0 12px; }
            .media-item.span-3 { grid-column: span 2; }
            .media-item.span-2 { grid-column: span 2; }
        }

        @media (max-width: 480px) {
            .media-grid { grid-template-columns: 1fr; }
            .media-item.span-3, .media-item.span-2 { grid-column: span 1; }
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <img src="../examplePics/1Recurso 2.png" alt="Villegas Logo">
            </a>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#works" class="active">Works</a></li>
                <li><a href="index.html#contact" class="contact-btn">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>


        <section class="project-header">
            <h1>MALALA</h1>
            <p>Bienvenido al hub de este proyecto. Aquí puedes describir de qué trató y cuál fue tu papel. Usando la
                grilla de abajo, la página está programada automáticamente para soportar tanto galerías de fotos como
                videos pesados.</p>
            <a href="index.html#works" class="back-link">&#8592; Back to Works</a>
        </section>

        <!-- Galería de Fotos MALALA -->
        <section class="media-grid" id="gallery">

            <!-- HORIZONTAL sola -->
            <div class="media-item span-3"><img src="_DSC7553.jpg" alt="MALALA - Horizontal 1"></div>

            <!-- 3 VERTICALES -->
            <div class="media-item"><img src="_DSC7547.jpg" alt="MALALA - V1"></div>
            <div class="media-item"><img src="_DSC7559.jpg" alt="MALALA - V2"></div>
            <div class="media-item"><img src="_DSC7550.jpg" alt="MALALA - V3"></div>

            <!-- HORIZONTAL sola -->
            <div class="media-item span-3"><img src="_DSC7603.jpg" alt="MALALA - Horizontal 2"></div>

            <!-- Verticales restantes seguidas (filas de 3) -->
            <div class="media-item"><img src="_DSC7560.jpg" alt="MALALA - V4"></div>
            <div class="media-item"><img src="_DSC7573.jpg" alt="MALALA - V5"></div>
            <div class="media-item"><img src="_DSC7561.jpg" alt="MALALA - V6"></div>

            <!-- Últimas 2 verticales -->
            <div class="media-item span-2"><img src="_DSC7583.jpg" alt="MALALA - V7"></div>
            <div class="media-item"><img src="_DSC7607.jpg" alt="MALALA - V8"></div>

        </section>
    </main>

</html>
