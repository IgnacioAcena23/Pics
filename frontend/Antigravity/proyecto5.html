    <style>
        body {
            padding-top: 120px;
        }

        .project-header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
            text-align: center;
        }

        .project-header h1 {
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .project-header p {
            font-size: 20px;
            color: var(--text-secondary);
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 15px;
            border: 2px solid rgba(255, 0, 34, 0.5);
            padding: 12px 28px;
            border-radius: 40px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 4px 20px rgba(255, 0, 34, 0.4);
            transform: translateY(-2px);
        }

        /* Curated photo grid - 3 columns, no cropping */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 1200px;
            margin: 20px auto 100px;
            padding: 0 40px;
        }

        .media-item {
            border-radius: 12px;
            overflow: hidden;
            background: #0b0e14;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .media-item.span-3 { grid-column: span 3; }
        .media-item.span-2 { grid-column: span 2; }

        .media-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .media-item:hover img { transform: scale(1.03); }

        @media (max-width: 768px) {
            body { padding-top: 100px; }
            .project-header { padding: 20px; }
            .project-header h1 { font-size: 36px; }
            .project-header p { font-size: 16px; }
            .media-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; padding: 0 12px; }
            .media-item.span-3 { grid-column: span 2; }
            .media-item.span-2 { grid-column: span 2; }
        }

        @media (max-width: 480px) {
            .media-grid { grid-template-columns: 1fr; }
            .media-item.span-3, .media-item.span-2 { grid-column: span 1; }
        }
    </style>
</head>
