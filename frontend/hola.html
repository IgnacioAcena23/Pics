<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villegas</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        html.lenis,
        html.lenis body {
            height: auto;
        }

        .lenis.lenis-smooth {
            scroll-behavior: auto !important;
        }

        .lenis.lenis-smooth [data-lenis-prevent] {
            overscroll-behavior: contain;
        }

        .lenis.lenis-stopped {
            overflow: hidden;
        }

        .lenis.lenis-scrolling iframe {
            pointer-events: none;
        }
        
/* =========================================================================
   INLINE STYLES (from style.css)
   ========================================================================= */

:root {
    /* Colors matched exactly to the logo */
    --bg-color: #0b0e14;
    --nav-bg: rgba(11, 14, 20, 0.85);
    --text-primary: #ffffff;
    --text-secondary: #a0a5b5;
    --accent: #ff0022;
    --accent-gradient: linear-gradient(135deg, #ff0022, #a60016);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Outfit', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-primary);
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
}

/* Header & Transparent Nav */
header {
    position: fixed;
    top: 24px;
    left: 0;
    width: 100%;
    z-index: 1000;
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
}

.logo {
    display: flex;
    align-items: center;
    text-decoration: none;
}

.logo img {
    height: 45px;
    width: auto;
    object-fit: contain;
}

/* Restyled Pill Navigation */
.nav-links {
    list-style: none;
    display: flex;
    align-items: center;
    gap: 32px;
    background: rgba(11, 14, 20, 0.85);
    border: 1px solid rgba(255, 0, 34, 0.2);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 6px 6px 6px 32px;
    border-radius: 50px;
    box-shadow: 0 8px 32px rgba(255, 0, 34, 0.15);
}

.nav-links li {
    position: relative;
    display: flex;
    align-items: center;
}

.nav-links a {
    text-decoration: none;
    color: #ffffff;
    font-weight: 600;
    font-size: 15px;
    text-transform: capitalize;
    padding: 10px 18px;
    border-radius: 24px;
    transition: all 0.3s ease;
}

.nav-links a:hover:not(.contact-btn),
.nav-links a.active:not(.contact-btn) {
    background-color: rgba(255, 0, 34, 0.2);
    color: var(--accent);
    transform: translateY(-2px);
    opacity: 1;
}

/* Contact Button inside Pill */
.nav-links .contact-btn {
    background: var(--accent);
    color: #ffffff;
    padding: 12px 28px;
    border-radius: 40px;
    font-weight: 700;
    font-size: 15px;
    transition: all 0.3s ease;
}

.nav-links .contact-btn:hover {
    background: #ffffff;
    color: var(--accent);
    transform: scale(1.02);
    box-shadow: 0 4px 15px rgba(255, 0, 34, 0.4);
}

/* Sections Layout */
section {
    min-height: 100vh;
    padding: 140px 40px 60px;
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* Centered Hero Section */
.hero,
.centered-hero {
    position: relative;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 100px;
    text-align: center;
    min-height: 1000px;
    overflow: hidden;
    /* Contains the giant orbit ring horizontally */
}

.hero-content {
    z-index: 10;
    position: relative;
    pointer-events: none;
    /* Let clicks pass to background if needed */
}

.hero-content h1 {
    font-size: 80px;
    line-height: 1.1;
    font-weight: 800;
    margin-bottom: 24px;
    text-align: center;
}

.hero-content p {
    font-size: 22px;
    color: var(--text-secondary);
    max-width: 500px;
    margin: 0 auto;
    text-align: center;
}

.highlight {
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Orbiting Background Layout */
.hero-image-sequence-bg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 900px;
    height: 900px;
    border-radius: 50%;
    /* Orbital path */
    animation: rotateCircle 35s linear infinite;
    z-index: 1;
    pointer-events: none;
}

.seq-img {
    position: absolute;
    width: 220px;
    height: 220px;
    border-radius: 16px;
    /* Square with slight rounding */
    object-fit: cover;
    animation: counterRotate 35s linear infinite;
    box-shadow: 0 15px 40px rgba(255, 0, 34, 0.4);
    border: 2px solid rgba(255, 0, 34, 0.5);
    pointer-events: auto;
}

/* Placement inside the 900x900 ring. Center is 450. Radius boundary is 340 from edge */
.seq-img:nth-child(1) {
    top: 0;
    left: 340px;
}

.seq-img:nth-child(2) {
    top: 340px;
    right: 0;
}

.seq-img:nth-child(3) {
    bottom: 0;
    left: 340px;
}

.seq-img:nth-child(4) {
    top: 340px;
    left: 0;
}

@keyframes rotateCircle {
    0% {
        transform: translate(-50%, -50%) rotate(0deg);
    }

    100% {
        transform: translate(-50%, -50%) rotate(360deg);
    }
}

@keyframes counterRotate {
    0% {
        transform: rotate(0deg);
    }

    100% {
        transform: rotate(-360deg);
    }
}

/* Other Sections */
.section-bloque h2 {
    font-size: 48px;
    margin-bottom: 20px;
}

.section-bloque p {
    font-size: 18px;
    color: var(--text-secondary);
}

/* Brands Marquee */
.brands-marquee {
    min-height: auto;
    padding: 80px 0;
    width: 100%;
    background: #0b0e14;
    /* Blend with body */
    border-top: 1px solid rgba(255, 0, 34, 0.1);
}

.marquee-container {
    width: 100%;
    overflow: hidden;
    position: relative;
}

.marquee-container::before,
.marquee-container::after {
    content: '';
    position: absolute;
    top: 0;
    width: 200px;
    height: 100%;
    z-index: 2;
    pointer-events: none;
}

.marquee-container::before {
    left: 0;
    background: linear-gradient(to right, #0b0e14, transparent);
}

.marquee-container::after {
    right: 0;
    background: linear-gradient(to left, #0b0e14, transparent);
}

.marquee-track {
    display: flex;
    width: max-content;
    animation: marqueeScroll 25s linear infinite;
}

.marquee-track:hover {
    animation-play-state: paused;
}

.marquee-group {
    display: flex;
    align-items: center;
    gap: 120px;
    padding-right: 120px;
    flex-shrink: 0;
}

.marquee-group img {
    max-height: 80px;
    max-width: 160px;
    object-fit: contain;
    filter: grayscale(100%) opacity(0.5);
    /* Modern silver/gray look */
    transition: all 0.4s ease;
    cursor: pointer;
}

.marquee-group img:hover {
    filter: grayscale(0%) opacity(1);
    /* Explodes into color on hover */
    transform: scale(1.1);
}

@keyframes marqueeScroll {
    0% {
        transform: translateX(-50%);
    }

    100% {
        transform: translateX(0);
    }
}

/* Tipografía global */
h1,
h2,
h3 {
    font-weight: 800;
    line-height: 1.1;
    text-transform: uppercase;
}

p {
    font-weight: 300;
    line-height: 1.6;
    opacity: 0.8;
}

/* Layout Container */
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 5vw;
}

/* ----- Secciones ----- */

/* Hero additions */
.hero-title {
    font-size: clamp(4rem, 15vw, 15rem);
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 2rem;
}

.hero-subtitle {
    font-size: 1.5rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.2em;
}

.scroll-indicator {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.mouse {
    width: 26px;
    height: 42px;
    border: 2px solid rgba(255, 255, 255, 0.4);
    border-radius: 20px;
    position: relative;
}

.mouse::before {
    content: '';
    width: 4px;
    height: 8px;
    background: #fff;
    border-radius: 4px;
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    animation: scroll 2s infinite ease-in-out;
}

@keyframes scroll {
    0% {
        transform: translate(-50%, 0);
        opacity: 1;
    }

    100% {
        transform: translate(-50%, 15px);
        opacity: 0;
    }
}

.features {
    padding: 15vh 0;
    background-color: var(--bg-color);
    position: relative;
    z-index: 2;
}

.section-title {
    font-size: clamp(2rem, 5vw, 4rem);
    margin-bottom: 5rem;
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2rem;
}

.feature-card {
    padding: 3rem 2rem;
    border-radius: 24px;
    transition: transform 0.3s ease, filter 0.3s ease;
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

.feature-card:hover {
    transform: translateY(-10px);
    filter: brightness(1.1);
}

.feature-card h3 {
    font-size: 2rem;
    margin-bottom: 1rem;
}

/* Horizontal Scroll Sector */
.horizontal-scroll {
    height: 100vh;
    overflow: hidden;
    background: #0f0f0f;
    position: relative;
}

.horizontal-container {
    display: flex;
    width: 300vw;
    /* 3 x 100vw panels */
    height: 100%;
}

.panel {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 5vw;
}

.panel h2 {
    font-size: clamp(3rem, 8vw, 8rem);
}

/* Deep Dive Parallax Text */
.deep-dive {
    height: 150vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    background: var(--bg-color);
}

.huge-text {
    font-size: 20vw;
    white-space: nowrap;
    opacity: 0.1;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

/* Footer Reveal Effect */
.footer {
    height: 80vh;
    background: #050505;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    /* Para dar el efecto de que la pagina pasa por encima y lo revela */
    position: relative;
    z-index: 0;
}

.footer-content h2 {
    font-size: clamp(3rem, 10vw, 8rem);
    margin-bottom: 1rem;
    background: linear-gradient(to right, #ffffff, #666666);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
    </style>
</head>

<body>

    <header>
        <nav>
            <a href="#home" class="logo">
                <img src="examplePics/1Recurso.png" alt="Villegas Logo">
            </a>
            <ul class="nav-links">
                <li><a href="#home" class="active">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#works">Works</a></li>
                <li><a href="#contact" class="contact-btn">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Inicio (Home) -->
        <section id="home" class="hero centered-hero">
            <div class="hero-image-sequence-bg">
                <img src="examplePics/_DSC7547.jpg" alt="DJ Motion 1" class="seq-img">
                <img src="examplePics/_DSC7550.jpg" alt="DJ Motion 2" class="seq-img">
                <img src="examplePics/_DSC7553.jpg" alt="DJ Motion 3" class="seq-img">
                <img src="examplePics/_DSC7559.jpg" alt="DJ Motion 4" class="seq-img">
            </div>

            <div class="hero-content">
                <h1>Bienvenido a <br><span class="highlight">Mi Visión</span></h1>
                <p>Diseño web moderno e inmersivo. Siente la energía y el movimiento.</p>
            </div>
        </section>

        <!-- Secciones adicionales definidas por los href -->
        <section id="about">
            <div class="hero">
                <div class="hero-content">
                    <h2 class="about-title"
                        style="font-size: clamp(3rem, 8vw, 6rem); margin-bottom: 40px; padding: 10px 15px 20px 15px; background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                        ¿Quién soy?</h2>
                    <p class="hero-subtitle">Desplázate hacia abajo</p>
                </div>
            </div>
        </section>

        <section id="works" class="section-bloque">
            <h2>Mis Trabajos</h2>
            <p>Galería o proyectos de Works...</p>
        </section>

        <section id="contact" class="section-bloque">
            <h2>Contacto</h2>
            <p>Formulario de Contact...</p>
        </section>

        <!-- Marcas / Partners -->
        <section id="brands" class="brands-marquee">
            <h3
                style="text-align: center; margin-bottom: 50px; color: var(--text-secondary); font-size: 16px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.7;">
                Marcas que confían en mí</h3>
            <div class="marquee-container">
                <div class="marquee-track">
                    <!-- Grupo 1 -->
                    <div class="marquee-group">
                        <img src="examplePics/Capa 1.png" alt="Marca 1">
                        <img src="examplePics/marca2.png" alt="Marca 2">
                        <img src="examplePics/marca3.png" alt="Marca 3">
                        <img src="examplePics/marca4.png" alt="Marca 4">
                        <img src="examplePics/marca5.png" alt="Marca 5">
                    </div>
                    <!-- Grupo 2 (Duplicado para lograr un loop continuo y sin cortes) -->
                    <div class="marquee-group">
                        <img src="examplePics/Capa 1.png" alt="Marca 1">
                        <img src="examplePics/marca2.png" alt="Marca 2">
                        <img src="examplePics/marca3.png" alt="Marca 3">
                        <img src="examplePics/marca4.png" alt="Marca 4">
                        <img src="examplePics/marca5.png" alt="Marca 5">
                    </div>
                </div>
            </div>
        </section>
    </main>


        <footer class="footer">
            <div class="footer-content">
                <h2>FIN</h2>
            </div>
        </footer>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
        
        <script>
// ==========================================
// INLINE SCRIPT (from script.js)
// ==========================================

// Registramos el plugin de ScrollTrigger al inicio
gsap.registerPlugin(ScrollTrigger);

// 1. Configuración e Inicialización de Lenis
const lenis = new Lenis({
    duration: 1.2,
    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), // Curva de suavidad
    orientation: 'vertical',
    gestureOrientation: 'vertical',
    smoothWheel: true,
    wheelMultiplier: 1,
    smoothTouch: false,
    touchMultiplier: 2,
    infinite: false,
});

// 2. Sincronizar Lenis interno del scroll con GSAP ScrollTrigger
// Esto hace que las animaciones no tengan nada de "lag" o retraso
lenis.on('scroll', ScrollTrigger.update);

// Usar el requestAnimationFrame estándar del explorador es más seguro para la rueda del mouse
function raf(time) {
    lenis.raf(time);
    requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

// ==========================================
// 3. ANIMACIONES CON GSAP Y SCROLLTRIGGER
// ==========================================

// --- A) Animación del Hero ---
// Al hacer scroll hacia abajo, el título del Hero se encoge y desaparece, con efecto parallax
gsap.to(".hero-title", {
    scale: 0.5,
    opacity: 0,
    y: -100, // Se mueve hacia arriba suavemente
    scrollTrigger: {
        trigger: ".hero",
        start: "top top", // Inicia cuando el .hero toca el tope
        end: "bottom top", // Termina cuando el final de .hero llega al tope
        scrub: 1, // 'scrub' asocia la animación a la posición exacta del scroll
    }
});

// --- B) Fade Up Stagger para los Cards de Features ---
// Esta animación no va con 'scrub', se dispara una vez y hace un bonito efecto escalonado
gsap.from(".feature-card", {
    y: 100,
    opacity: 0,
    duration: 0.8,
    stagger: 0.2, // Cada tarjeta se anima con 0.2s de diferencia
    ease: "power3.out",
    scrollTrigger: {
        trigger: ".features",
        start: "top 75%", // Se activa cuando la sección está al 75% del viewport de altura
        toggleActions: "play none none reverse" // Play al entrar, reversa al salir de nuevo
    }
});

// --- C) Pinning Horizontal Scroll ---
// Este es un efecto premium: La pantalla se pinea y en lugar de bajar, se mueve a los lados.
const horizontalContainer = document.querySelector(".horizontal-container");
if (horizontalContainer) {
    const panels = gsap.utils.toArray(".panel");

    gsap.to(panels, {
        xPercent: -100 * (panels.length - 1),
        ease: "none",
        scrollTrigger: {
            trigger: ".horizontal-scroll",
            pin: true, // ¡Clave! 'Pinea' la sección a la pantalla hasta que acabe
            start: "top top",
            end: () => "+=" + horizontalContainer.offsetWidth, // Le da una distancia equivalente al ancho para escrollear
            scrub: 1, // Hace que actúe fluidamente atado al ratón
            invalidateOnRefresh: true // Recalcula si el usuario redimensiona la ventana
        }
    });
}

// --- D) Texto Extra Grande Parallax (Deep Dive) ---
// El texto enorme detrás hace zoom hacia nosotros al mover la rueda.
gsap.fromTo(".huge-text", 
    { scale: 0.5, letterSpacing: "-10px" },
    { 
        scale: 2, 
        letterSpacing: "40px",
        scrollTrigger: {
            trigger: ".deep-dive",
            start: "top bottom",
            end: "bottom top",
            scrub: 1
        }
    }
);

// --- E) Animación Sobre Mí (Enlarging Title) ---
// Al bajar de Home a Sobre Mí, el título "Sobre mí" se agranda fluidamente
gsap.fromTo("#about .about-title",
    { scale: 0.8, opacity: 0, y: 50 },
    {
        scale: 1.3,
        opacity: 1,
        y: 0,
        scrollTrigger: {
            trigger: "#about",
            start: "top 80%", // Inicia la animación cuando la parte superior de la sección está al 80% de la ventana
            end: "top 30%",   // Termina cuando llega al 30%
            scrub: 1          // Animación atada al scroll
        }
    }
);
        </script>
