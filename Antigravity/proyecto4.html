<!DOCTYPE html>
<html lang="es" style="scroll-behavior: smooth;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis (Remix) - Villegas</title>
    <link rel="icon" href="1Recurso.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            padding-top: 120px;
        }

        .project-header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
            text-align: center;
        }

        .project-header h1 {
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .project-header p {
            font-size: 20px;
            color: var(--text-secondary);
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 15px;
            border: 2px solid rgba(255, 0, 34, 0.5);
            padding: 12px 28px;
            border-radius: 40px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 4px 20px rgba(255, 0, 34, 0.4);
            transform: translateY(-2px);
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 20px auto 100px;
            padding: 0 40px;
        }

        .media-item {
            border-radius: 16px;
            overflow: hidden;
            background: #0b0e14;
            border: 1px solid rgba(255, 255, 255, 0.05);
            aspect-ratio: 4/3;
        }

        .media-item img,
        .media-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .media-item:hover img {
            transform: scale(1.05);
        }

        .media-item.large {
            grid-column: span 2;
            aspect-ratio: 16/9;
        }

        @media (max-width: 768px) {
            .media-item.large {
                grid-column: span 1;
                aspect-ratio: 4/3;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <img src="1Recurso.png" alt="Villegas Logo">
            </a>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#works" class="active">Works</a></li>
                <li><a href="index.html#contact" class="contact-btn">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- GSAP Scrubbed Bento Gallery -->
        <div class="bento-container">
            <div class="bento-gallery">
                <div class="bento-item item-1"><img src="_DSC7547.jpg" alt="Gallery Image 1"
                        style="object-position: center 20%;"></div>
                <div class="bento-item item-2"><img src="_DSC7550.jpg" alt="Hero Image"></div>
                <div class="bento-item item-3"><img src="_DSC7553.jpg" alt="Gallery Image 2"></div>
                <div class="bento-item item-4"><img src="_DSC7559.jpg" alt="Gallery Image 3"></div>
                <div class="bento-item item-5"><img src="foto1.jpg" alt="Gallery Image 4"></div>
                <div class="bento-item item-6"><img src="_DSC0346.jpg" alt="Gallery Image 5"></div>
                <div class="bento-item item-7"><img src="_DSC7553.jpg" alt="Gallery Image 6"
                        style="filter: grayscale(1);"></div>
            </div>
        </div>

        <section class="project-header">
            <h1>Oasis (Remix)</h1>
            <p>Bienvenido al hub de este proyecto. Aquí puedes describir de qué trató y cuál fue tu papel. Usando la
                grilla de abajo, la página está programada automáticamente para soportar tanto galerías de fotos como
                videos pesados.</p>
            <a href="index.html#works" class="back-link">&#8592; Volver a la Galería</a>
        </section>

        <!-- Galería de Medios: Puedes agregar cuantos "media-item" quieras duplicando el bloque -->
        <section class="media-grid">
            <div class="media-item large">
                <!-- Ejemplo de Video -->
                <video controls muted loop poster="_DSC7559.jpg" style="width: 100%; height: 100%; object-fit: cover;">
                    <source src="tu_video.mp4" type="video/mp4">
                    Tu navegador no soporta la reproducción de video.
                </video>
            </div>
            <div class="media-item">
                <img src="_DSC7547.jpg" alt="Foto">
            </div>
            <div class="media-item">
                <img src="_DSC7550.jpg" alt="Foto">
            </div>
            <div class="media-item">
                <img src="_DSC7553.jpg" alt="Foto">
            </div>
            <div class="media-item">
                <img src="_DSC7559.jpg" alt="Foto">
            </div>
    </main>

    <!-- GSAP Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
        gsap.registerPlugin(ScrollTrigger);

        const transforms = [
            { x: -1200, y: -600, scale: 1.8, r: -25 }, // 1
            { x: 0, y: 0, scale: 1.8, r: 0 },          // 2 (Center Hero)
            { x: 1200, y: -600, scale: 1.8, r: 25 },   // 3
            { x: 1200, y: 0, scale: 1.8, r: 10 },      // 4
            { x: -1200, y: 800, scale: 1.8, r: -20 },  // 5
            { x: 0, y: 1000, scale: 1.8, r: 0 },       // 6 
            { x: 1200, y: 800, scale: 1.8, r: 15 }     // 7
        ];

        const cards = gsap.utils.toArray('.bento-item');

        if (window.innerWidth > 768) {
            cards.forEach((card, i) => {
                if (transforms[i]) {
                    gsap.set(card, {
                        x: transforms[i].x,
                        y: transforms[i].y,
                        scale: transforms[i].scale,
                        rotation: transforms[i].r
                    });
                }
            });

            gsap.to(cards, {
                x: 0,
                y: 0,
                scale: 1,
                rotation: 0,
                duration: 1,
                ease: "power2.inOut",
                scrollTrigger: {
                    trigger: ".bento-container",
                    start: "top top",
                    end: "+=1500",
                    scrub: 1,
                    pin: true
                }
            });
        }
    </script>
</body>

</html>
